<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LoadPilot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontSize: {
            'xs': ['1.1rem', { lineHeight: '1.4rem' }], // ~12.1px at 11px root
            'sm': ['1.3rem', { lineHeight: '1.6rem' }], // ~14.3px
            'base': ['1.5rem', { lineHeight: '1.8rem' }], // ~16.5px
            'lg': ['1.7rem', { lineHeight: '2rem' }], // ~18.7px
            'xl': ['2rem', { lineHeight: '2.4rem' }], // 22px
            '2xl': ['2.4rem', { lineHeight: '2.8rem' }], // 26.4px
            '3xl': ['3rem', { lineHeight: '3.4rem' }], // 33px
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #1e293b;
    }

    ::-webkit-scrollbar-thumb {
      background: #475569;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #64748b;
    }
  </style>

  }
}
</script>
