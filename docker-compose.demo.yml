# Sales Demo — one-command setup
# Usage: docker compose -f docker-compose.demo.yml up --build
# Then open http://localhost:3000
#
# Prerequisites:
#   1. Copy .env.example to .env.local and fill in Firebase UIDs + API keys
#   2. Docker and Docker Compose installed
#
# Teardown:
#   docker compose -f docker-compose.demo.yml down -v   (removes data)
#   docker compose -f docker-compose.demo.yml down       (keeps data)

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: demo
      MYSQL_DATABASE: loadpilot_demo
    ports:
      - "3307:3306"   # 3307 on host to avoid conflicts with local MySQL
    volumes:
      - demo_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=demo", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.demo
      target: backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "5000:5000"
    env_file:
      - .env.local
    environment:
      # Database — hardcoded for the demo compose network
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: root
      DB_PASSWORD: demo
      DB_NAME: loadpilot_demo
      # Server
      PORT: "5000"
      NODE_ENV: development
      # Demo flags
      ALLOW_DEMO_RESET: "1"
      VITE_DEMO_NAV_MODE: sales
      # Relaxed validation for demo (no Firebase service account needed)
      FIREBASE_SERVICE_ACCOUNT: "{}"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.demo
      target: frontend
      args:
        # Vite bakes VITE_* vars at build time — pass them as build args.
        # Values come from .env.local via shell interpolation, or set defaults.
        VITE_DEMO_NAV_MODE: sales
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET:-}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  demo_mysql_data:
