name: CI

on:
  push:
    branches: [main, ralph/*, recovery/*, fix/*, team*]
  pull_request:
    branches: [main, fix/pr26-production-remediation]

jobs:
  frontend-typecheck:
    name: Frontend TypeScript
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        shell: cmd
      - run: npx tsc --noEmit
        shell: cmd

  server-typecheck:
    name: Server TypeScript
    runs-on: self-hosted
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        shell: cmd
      - run: npx tsc --noEmit
        shell: cmd

  server-tests:
    name: Server Tests
    runs-on: self-hosted
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        shell: cmd
      - run: npx vitest run
        shell: cmd

  frontend-tests:
    name: Frontend Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        shell: cmd
      - run: npx vitest run
        shell: cmd
