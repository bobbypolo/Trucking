name: CI

on:
  push:
    branches: [main, mobile/trucker-app, ralph/*, recovery/*, fix/*, chore/*, team*]
  pull_request:
    branches: [main, mobile/trucker-app, fix/pr26-production-remediation]

env:
  CI: true

jobs:
  frontend-typecheck:
    name: Frontend TypeScript
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Create test fixtures
        shell: cmd
        run: |
          if not exist fixtures\test-users.json copy fixtures\test-users.example.json fixtures\test-users.json
      - run: npm ci
        shell: cmd
      - run: npx tsc --noEmit
        shell: cmd

  server-typecheck:
    name: Server TypeScript
    runs-on: self-hosted
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        shell: cmd
      - run: npx tsc --noEmit
        shell: cmd

  server-tests:
    name: Server Tests
    runs-on: self-hosted
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Create test fixtures
        shell: cmd
        run: |
          if not exist ..\fixtures\test-users.json copy ..\fixtures\test-users.example.json ..\fixtures\test-users.json
      - run: npm ci
        shell: cmd
      - name: Run unit and route tests (exclude integration)
        shell: cmd
        run: npx vitest run --exclude "__tests__/integration/**" --exclude "__tests__/scripts/**"

  frontend-tests:
    name: Frontend Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Create test fixtures
        shell: cmd
        run: |
          if not exist fixtures\test-users.json copy fixtures\test-users.example.json fixtures\test-users.json
      - run: npm ci
        shell: cmd
      - run: npx vitest run
        shell: cmd

  # ---- Tenant isolation enforcement (S-3.1: R-P3-04) ----

  tenant-scope-check:
    name: Tenant Scope Check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Check for unscoped tenant-table queries (R-P3-04)
        shell: cmd
        run: node scripts/check-tenant-scope.cjs

  # ---- New CI jobs (S-1.2: R-P1-06 through R-P1-10) ----

  frontend-build:
    name: Frontend Build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Create test fixtures
        shell: cmd
        run: |
          if not exist fixtures\test-users.json copy fixtures\test-users.example.json fixtures\test-users.json
      - run: npm ci
        shell: cmd
      - name: Build frontend (R-P1-06)
        shell: cmd
        run: npm run build

  migration-validation:
    name: Migration Validation
    runs-on: self-hosted
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
        shell: cmd
      - name: Validate migration files (R-P1-07)
        shell: cmd
        run: node ..\scripts\validate-migrations.cjs

  deployment-readiness:
    name: Deployment Readiness
    runs-on: self-hosted
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Create test fixtures
        shell: cmd
        run: |
          if not exist ..\fixtures\test-users.json copy ..\fixtures\test-users.example.json ..\fixtures\test-users.json
      - run: npm ci
        shell: cmd
      - name: Run deployment-readiness tests (R-P1-08)
        shell: cmd
        run: npx vitest run __tests__/integration/deployment-readiness.test.ts

  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    environment: DEMO
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: loadpilot_test
        ports:
          - "3306:3306"
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install server dependencies
        run: cd server && npm ci
      - name: Create test fixtures
        run: |
          if [ ! -f fixtures/test-users.json ]; then
            cp fixtures/test-users.example.json fixtures/test-users.json
          fi
      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root --password=test --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
      - name: Start Express server and smoke test (R-P1-09)
        env:
          PORT: "5000"
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_USER: root
          DB_PASSWORD: test
          DB_NAME: loadpilot_test
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Start server in background
          cd server
          npx tsx index.ts &
          SERVER_PID=$!

          # Wait for server to be ready (up to 30 seconds)
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000/api/health > /dev/null 2>&1; then
              echo "Server is ready"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 1
          done

          # Hit health endpoint and verify response
          RESPONSE=$(curl -s http://localhost:5000/api/health)
          echo "Health response: $RESPONSE"

          STATUS=$(echo "$RESPONSE" | jq -r '.status')
          MYSQL_STATUS=$(echo "$RESPONSE" | jq -r '.mysql')

          echo "status=$STATUS mysql=$MYSQL_STATUS"

          # Verify expected values
          if [ "$STATUS" != "ok" ]; then
            echo "FAIL: Expected status=ok, got status=$STATUS"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          if [ "$MYSQL_STATUS" != "connected" ]; then
            echo "FAIL: Expected mysql=connected, got mysql=$MYSQL_STATUS"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi

          echo "Smoke test PASSED: status=ok, mysql=connected"
          kill $SERVER_PID 2>/dev/null || true

  python-hooks:
    name: Python Hook Tests
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        shell: cmd
        run: pip install pytest pyyaml
      - name: Run hook tests
        shell: cmd
        run: python -m pytest .claude/hooks/tests/ -v

  e2e-api-smoke:
    name: E2E API Smoke
    runs-on: self-hosted
    needs: [server-tests, frontend-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install root dependencies
        shell: cmd
        run: npm ci
      - name: Install server dependencies
        shell: cmd
        run: cd server && npm ci
      - name: Create test fixtures
        shell: cmd
        run: |
          if not exist fixtures\test-users.json copy fixtures\test-users.example.json fixtures\test-users.json
      - name: Install Playwright browsers
        shell: cmd
        run: npx playwright install chromium
      - name: Run Playwright API smoke tests
        shell: cmd
        env:
          PORT: "5000"
          NODE_ENV: test
          JWT_SECRET: ci-test-secret
          FIREBASE_SERVICE_ACCOUNT: "{}"
        run: npx playwright test
