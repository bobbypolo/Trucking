# Demo Certification — CI pipeline for Bulletproof Sales Demo
#
# Proves the sales demo works on a clean environment, not just one
# developer's machine. Runs the full certification pipeline:
#   reset -> seed -> start servers -> Playwright e2e -> evidence append
#
# Triggers:
#   - workflow_dispatch: manual trigger (requires secrets configured)
#   - push tags matching demo/*
#
# Required GitHub Secrets (in Demo environment):
#   SALES_DEMO_ADMIN_FIREBASE_UID  - Firebase UID for the demo admin user
#   SALES_DEMO_DRIVER_FIREBASE_UID - Firebase UID for the demo driver user
#   SALES_DEMO_ADMIN_EMAIL         - Firebase auth email for demo admin
#   SALES_DEMO_ADMIN_PASSWORD      - Firebase auth password for demo admin
#   SALES_DEMO_DRIVER_EMAIL        - Firebase auth email for demo driver
#   SALES_DEMO_DRIVER_PASSWORD     - Firebase auth password for demo driver
#   FIREBASE_WEB_API_KEY           - Firebase Web API key
#   FIREBASE_PROJECT_ID            - Firebase project ID
#   FIREBASE_SERVICE_ACCOUNT       - Full service account JSON
#   VITE_FIREBASE_API_KEY          - Browser Firebase API key
#   VITE_FIREBASE_AUTH_DOMAIN      - Browser Firebase auth domain
#   VITE_FIREBASE_PROJECT_ID       - Browser Firebase project ID
#   VITE_FIREBASE_STORAGE_BUCKET   - Browser Firebase storage bucket
#   VITE_FIREBASE_APP_ID           - Browser Firebase app ID
#   GEMINI_API_KEY                 - Google Gemini AI key

name: Demo Certification

on:
  workflow_dispatch:
  push:
    tags: ["demo/*"]

env:
  CI: true
  NODE_ENV: test

jobs:
  certify:
    name: Sales Demo Certification
    runs-on: ubuntu-latest
    environment: Demo

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: demo
          MYSQL_DATABASE: loadpilot_demo
        ports:
          - "3306:3306"
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Create test fixtures
        run: |
          if [ ! -f fixtures/test-users.json ]; then
            cp fixtures/test-users.example.json fixtures/test-users.json
          fi

      - name: Write Firebase credentials
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          echo "$FIREBASE_SA_JSON" > server/serviceAccount.json
          if [ ! -s server/serviceAccount.json ]; then
            echo "ERROR: serviceAccount.json is empty — FIREBASE_SERVICE_ACCOUNT secret may not be set"
            exit 1
          fi
          node -e "JSON.parse(require('fs').readFileSync('server/serviceAccount.json','utf8')); console.log('serviceAccount.json: valid JSON')"
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/server/serviceAccount.json" >> "$GITHUB_ENV"

      - name: Create .env.local for demo
        run: |
          cat > .env.local << 'ENVEOF'
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_USER=root
          DB_PASSWORD=demo
          DB_NAME=loadpilot_demo
          ALLOW_DEMO_RESET=1
          VITE_DEMO_NAV_MODE=sales
          JWT_SECRET=ci-demo-certification-secret
          ENVEOF
          sed -i 's/^[[:space:]]*//' .env.local
          # Firebase server secrets
          echo "SALES_DEMO_ADMIN_FIREBASE_UID=${{ secrets.SALES_DEMO_ADMIN_FIREBASE_UID }}" >> .env.local
          echo "SALES_DEMO_DRIVER_FIREBASE_UID=${{ secrets.SALES_DEMO_DRIVER_FIREBASE_UID }}" >> .env.local
          echo "SALES_DEMO_ADMIN_EMAIL=${{ secrets.SALES_DEMO_ADMIN_EMAIL }}" >> .env.local
          echo "SALES_DEMO_ADMIN_PASSWORD=${{ secrets.SALES_DEMO_ADMIN_PASSWORD }}" >> .env.local
          echo "SALES_DEMO_DRIVER_EMAIL=${{ secrets.SALES_DEMO_DRIVER_EMAIL }}" >> .env.local
          echo "SALES_DEMO_DRIVER_PASSWORD=${{ secrets.SALES_DEMO_DRIVER_PASSWORD }}" >> .env.local
          echo "FIREBASE_WEB_API_KEY=${{ secrets.FIREBASE_WEB_API_KEY }}" >> .env.local
          echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}" >> .env.local
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env.local
          # Browser-side Firebase config (Vite reads VITE_* at dev server startup)
          echo "VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}" >> .env.local
          echo "VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}" >> .env.local
          echo "VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}" >> .env.local
          echo "VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}" >> .env.local
          echo "VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}" >> .env.local

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root --password=demo --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Run migrations
        run: node server/scripts/apply-all-migrations.cjs
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_USER: root
          DB_PASSWORD: demo
          DB_NAME: loadpilot_demo

      - name: Run demo certification
        run: npm run demo:certify:sales
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: "3306"
          DB_USER: root
          DB_PASSWORD: demo
          DB_NAME: loadpilot_demo
          ALLOW_DEMO_RESET: "1"
          PORT: "5000"
          VITE_DEMO_NAV_MODE: sales
          JWT_SECRET: ci-demo-certification-secret
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CORS_ORIGIN: "http://localhost:3101,http://localhost:3000,http://localhost:5000"

      - name: Upload certification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-certification-evidence
          path: |
            docs/release/evidence.md
            test-results/
          retention-days: 30
